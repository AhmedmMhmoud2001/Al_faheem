    <script>
      (function () {
        try {
          var t = localStorage.getItem('al-faheem-theme');
          if (
            t === 'dark' ||
            (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)
          ) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
